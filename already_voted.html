{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card glass-panel shadow-lg border-0 rounded-4 mt-5 text-center p-4 p-md-5">
            <div class="mb-4 text-warning">
                <i class="bi bi-exclamation-triangle-fill" style="font-size: 5rem;"></i>
            </div>
            <h3 class="fw-bold mb-3">Access Denied</h3>
            <p class="lead text-muted mb-4">Our records indicate that you have already cast your vote.</p>
            <div class="alert alert-warning border-warning" role="alert">
                <i class="bi bi-info-circle-fill me-2"></i> Multiple votes are not permitted by law.
            </div>
            <a href="{{ url_for('login') }}" class="btn btn-premium rounded-pill px-4 mt-3 fw-bold">
                Return to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
