{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="alert alert-info border-info text-center shadow-sm rounded-3 mb-4 py-3" role="alert">
            <i class="bi bi-phone fs-4 d-block mb-2 text-primary"></i> 
            <span class="text-muted">Simulated OTP for your mobile...</span><br>
            <strong class="d-block mt-2 fs-5">Your OTP is: <span class="fs-3 text-primary tracking-wider">{{ otp }}</span></strong>
        </div>

        <div class="card glass-panel border-0 rounded-4 overflow-hidden mt-3">
            <div class="card-header text-white text-center py-4">
                <h4 class="mb-0 fw-bold">Two-Factor Auth</h4>
                <p class="small mb-0 mt-1 opacity-75">Enter the 6-digit OTP sent to your linked mobile number</p>
            </div>
            <div class="card-body p-4 p-md-5">
                <form action="{{ url_for('verify_otp') }}" method="POST">
                    <div class="mb-5 text-center">
                        <label for="otp" class="form-label fw-bold text-secondary text-center w-100 mb-3">Enter OTP</label>
                        <input type="text" class="form-control form-control-lg text-center fw-bold fs-3 mx-auto" style="max-width: 250px; letter-spacing: 0.5rem;" id="otp" name="otp" pattern="\d{6}" maxlength="6" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-premium btn-lg w-100 rounded-pill py-3 fw-bold shadow-sm">
                        <i class="bi bi-check-circle me-2"></i> Verify & Access Voting Booth
                    </button>
                    <div class="text-center mt-4">
                        <a href="{{ url_for('login') }}" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left me-1"></i> Return to Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
